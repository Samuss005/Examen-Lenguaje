<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Hiragana</title>
<link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

<h1 class="titulo">Juego Hiragana</h1>

<div class="contenedor_juego">

    <div class="contenedor_imagen">
        <img id="imagen_hiragana" src="/assets/chi.jpg" alt="hiragana">
    </div>

    <div class="zona_respuesta">
        <input id="entrada_usuario" type="text" placeholder="Escribe la pronunciación">
        <button id="boton_comprobar">Comprobar</button>
        <button id="boton_resetear">Resetear</button>
    </div>

</div>

<div class="contenedor_resumen">

    <div class="tarjeta">
        <p>Aciertos</p>
        <span id="aciertos">0</span>
    </div>

    <div class="tarjeta">
        <p>Fallos</p>
        <span id="fallos">0</span>
    </div>

    <div class="tarjeta">
        <p>Intentos</p>
        <span id="intentos">0</span>
    </div>

    <div class="tarjeta">
        <p>Pendientes</p>
        <span id="pendientes">10</span>
    </div>

</div>

<script src="datos.js"></script>
<script src="script.js"></script>

</body>
</html>
